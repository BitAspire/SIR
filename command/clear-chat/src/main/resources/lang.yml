lang:
  # Help menu for the clear chat command.
  # Displayed when running /clear-chat help or with invalid arguments.
  help:
    - '&7'
    - ' &6>> &eClear Chat - Help'
    - '  &7- &b/clear-chat help&7: Displays this help menu.'
    - '  &7- &b/clear-chat @a&7: Clears the chat for all online players.'
    - '  &7- &b/clear-chat <player>&7: Clears the chat for a specific player.'
    - '&7'

  # Success messages for each clearing scenario.
  success:
    # Broadcast confirmation when clearing chat globally.
    all: "<P> &7Chat has been cleared for all players."

    # Confirmation when clearing chat for a single player.
    # {player} = target player name.
    player: "<P> &7Chat has been cleared for &e{player}&7."
