# Menu section used when players enter one or more hex colors.
hex:
  # Inventory title for the hex color picker.
  title: "Type one or more hex colors"
  # Buttons shown inside the hex color picker.
  buttons:
    # Informational item that explains accepted hex formats.
    info:
      # Display name shown on the inventory item.
      name: "&eBasic Information"
      # Lore shown under the item name.
      lore:
        - "&7This is a gradient color."
        - "&7You can use hex colors."
        - "&7Example: #ff0000 or #ff0000;#00ff00;#0000ff"
      # Bukkit material used for the item.
      item: GREEN_CONCRETE
    # Button used to confirm the selected hex colors.
    accept:
      name: "&aAccept colors"
      lore:
        - "&7Accepts the selected hex colors."
      item: LIME_CONCRETE

# Preview item shown for the currently selected color or format.
selected:
  lore:
    # If true, this lore is appended to the selected color lore.
    additional: true
    # Lines appended or displayed on the selected item.
    list:
      - "&8[<sc>Selected</sc>]"
  # Bukkit material used for the selected preview item.
  item: GLASS_PANE

# Color and format buttons. Each child key is the internal color or format ID.
# Every entry can define permission, name, lore, and item using the same structure.
colors:
  # Standard Minecraft colors use the same entry layout.
  dark_red:
    # Permission required to select this color or format.
    permission: sir.chat.color.dark-red
    # Display name shown in the color menu.
    name: "&4Dark Red"
    # Description shown under the display name.
    lore:
      - "&7This color is dark red."
    # Bukkit material used for the menu item.
    item: RED_CONCRETE
  red:
    permission: sir.chat.color.red
    name: "&cRed"
    lore:
      - "&7This color is red."
    item: PINK_CONCRETE
  gold:
    permission: sir.chat.color.gold
    name: "&6Gold"
    lore:
      - "&7This color is gold."
    item: ORANGE_CONCRETE
  yellow:
    permission: sir.chat.color.yellow
    name: "&eYellow"
    lore:
      - "&7This color is yellow."
    item: YELLOW_CONCRETE
  green:
    permission: sir.chat.color.green
    name: "&aGreen"
    lore:
      - "&7This color is green."
    item: LIME_CONCRETE
  dark_green:
    permission: sir.chat.color.dark-green
    name: "&2Dark Green"
    lore:
      - "&7This color is dark green."
    item: GREEN_CONCRETE
  aqua:
    permission: sir.chat.color.aqua
    name: "&bAqua"
    lore:
      - "&7This color is aqua."
    item: LIGHT_BLUE_CONCRETE
  dark_aqua:
    permission: sir.chat.color.dark-aqua
    name: "&3Dark Aqua"
    lore:
      - "&7This color is dark aqua."
    item: CYAN_CONCRETE
  blue:
    permission: sir.chat.color.blue
    name: "&9Blue"
    lore:
      - "&7This color is blue."
    item: BLUE_TERRACOTTA
  dark_blue:
    permission: sir.chat.color.dark-blue
    name: "&1Dark Blue"
    lore:
      - "&7This color is dark blue."
    item: BLUE_CONCRETE
  light_purple:
    permission: sir.chat.color.light-purple
    name: "&dLight Purple"
    lore:
      - "&7This color is light purple."
    item: MAGENTA_CONCRETE
  purple:
    permission: sir.chat.color.purple
    name: "&5Purple"
    lore:
      - "&7This color is purple."
    item: PURPLE_CONCRETE
  white:
    permission: sir.chat.color.white
    name: "&fWhite"
    lore:
      - "&7This color is white."
    item: WHITE_CONCRETE
  gray:
    permission: sir.chat.color.gray
    name: "&7Gray"
    lore:
      - "&7This color is gray."
    item: LIGHT_GRAY_CONCRETE
  dark_gray:
    permission: sir.chat.color.dark-gray
    name: "&8Dark Gray"
    lore:
      - "&7This color is dark gray."
    item: GRAY_CONCRETE
  black:
    permission: sir.chat.color.black
    name: "&0Black"
    lore:
      - "&7This color is black."
    item: GRAY_CONCRETE
  # Text format entries use the same layout as colors, but apply a format instead of a color.
  bold:
    permission: sir.chat.color.bold
    name: "&lBold"
    lore:
      - "&7This text is bold."
    item: OBSIDIAN
  italic:
    permission: sir.chat.color.italic
    name: "&oItalic"
    lore:
      - "&7This text is italic."
    item: QUARTZ_STAIRS
  underline:
    permission: sir.chat.color.underline
    name: "&nUnderline"
    lore:
      - "&7This text is underlined."
    item: QUARTZ_SLAB
  strikethrough:
    permission: sir.chat.color.strikethrough
    name: "&mStrikethrough"
    lore:
      - "&7This text is strikethrough."
    item: COBWEB
  magic:
    permission: sir.chat.color.magic
    name: "&kMagic"
    lore:
      - "&7This text is magic."
    item: DRAGON_BREATH
  # Special dynamic formats can open extra prompts or apply generated colors.
  hex:
    permission: sir.chat.color.hex
    name: "&gHex Colors"
    lore:
      - "&7This text has one or more hex colors."
    item: DIAMOND
  rainbow:
    permission: sir.chat.color.rainbow
    name: "&rRainbow"
    lore:
      - "&7This text is rainbow."
    item: EMERALD
  reset:
    # Reset has no permission so every player who can open the menu can use it.
    name: "&fReset formats"
    lore:
      - "&7Resets any format selected."
    item: BARRIER
