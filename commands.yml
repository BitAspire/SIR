# Template used by external SIR command providers.
# Copy this structure when packaging a custom command jar.
main: com.example.plugin.command.CommandProviderImpl
name: CommandProviderImpl
title: "&7Example Command Provider"
description:
  - "&7Registers example commands through the SIR command provider system."

commands:
  command:
    # Command permission and registration behavior.
    permission: sir.command.example
    override-existing: true
    aliases: [ examplecmd, ex, sample ]

    sub-commands:
      # Explicit permission for the reload subcommand.
      reload: sir.command.example.reload
      # Empty values fall back to "{main permission node}.{sub-command name}".
      help: ''

    description: 'Example command registered by a SIR command provider.'
    usage: '/command <sub-command> [args]'
    permission-message: '&cYou do not have permission to use this command.'

    depends:
      # When enabled, the command only registers if the parent command is available.
      # The command also inherits the parent enabled and override-existing values.
      enabled: false
      # Parent command name. Leave empty when this command is standalone.
      parent: ''
