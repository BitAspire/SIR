# Messages sent by advancement frame type.
# Text supports MiniMessage through Takion/PrismaticAPI, SIR tags, legacy color
# codes, hex colors, and the placeholders listed below.
# Available placeholders include {player}, {adv}, {description}, {type}, {low-type}, and {cap-type}.
messages:
  task:
    - ' &e{player}&7 has got the {low-type} <hover:"&7{description}">&a{adv}</text>'
  goal:
    - ' &e{player}&7 has reached the {type} <hover:"&7{description}">&b{adv}</text>'
  challenge:
    - ' &e{player}&7 has finished the &d{cap-type}&7: <hover:"&7{description}">&5{adv}</text>'
  custom:
    - ' &e{player} &7has made the {low-type} <hover:"&7{description}">&b{adv}</text>'

# Commands executed by advancement frame type. Commands run from console.
# Use [] to disable command execution for a frame type.
commands:
  task:
    - 'minecraft:experience add {player} 100 points'
  goal:
    - 'minecraft:experience add {player} 500 points'
  challenge:
    - 'minecraft:experience add {player} 1000 points'
  custom: []
