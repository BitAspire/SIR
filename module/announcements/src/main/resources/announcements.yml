# Announcement lines support MiniMessage through Takion/PrismaticAPI, SIR tags,
# legacy color codes, hex colors, channel prefixes, and documented placeholders.
announcements:
  1:
    # Optional sound played when this announcement is sent.
    sound:
      enabled: true
      type: ENTITY_PLAYER_LEVELUP
      volume: 1.0
      pitch: 1.0

    lines:
      - '&7'
      - '<C>&aThis is a SIR announcement.'
      - '<C>&7Edit or disable announcements in this file.'
      - '&7'

  2:
    lines:
      # Action bar messages appear above the hotbar.
      - '[ACTION-BAR] &7This is an action-bar announcement.'
      # Title format: [TITLE] main_title<n>subtitle.
      - '[TITLE] {#321ABA}SIR Announcement<n>&#869021Server update available.'

    # Commands execute from console when the announcement is sent.
    commands:
      - 'say This is an example announcement command.'

  3:
    sound:
      enabled: true
      type: ENTITY_PLAYER_BURP
      volume: 1.0
      pitch: 1.0
    lines:
      - '&7'
      - '<C>&eThis is another SIR announcement.'
      - '<C>&7Adjust interval and random order in config.yml.'
      - '&7'
