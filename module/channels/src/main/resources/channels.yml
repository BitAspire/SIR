version: 2

# Channels v2
# - If `inherits` is not declared, the channel inherits from `default-channel`.
# - If `access.default` is false and there are no prefixes/commands, the channel is not reachable directly.
# - Every filter inside `audience` is cumulative.
# - If `logging.enabled` is false, SIR uses the legacy chat logger behavior.
# - Legacy or hybrid files are auto-migrated to channels v2 on load.

default-channel:
  enabled: true
  access:
    default: true
  audience:
    radius: 120
    include-sender: true
  style:
    tag: '&8[&aLocal&8]'
    colors:
      normal: false
      special: false
      rgb: false
      default: '&f'
    format: '{tag} &7{player}&8: {color}{message}'
  logging:
    enabled: false

channels:
  global:
    priority: 100
    access:
      prefixes: [ "!" ]
      commands: [ "/g", "/global" ]
      strip-prefix: true
    style:
      tag: '&8[&6Global&8]'
      hover:
        - '&7Message sent to the whole server.'
      format: '{tag} &7{player}&8: {color}{message}'

  staff:
    permission: 'sir.channel.staff.use'
    priority: 200
    access:
      prefixes: [ "#" ]
      commands: [ "/sc", "/staffchat" ]
    audience:
      permission: 'sir.channel.staff.see'
      include-sender: true
    style:
      tag: '&8[&cStaff&8]'
      colors:
        normal: true
        special: true
        rgb: true
        default: '&c'
      hover:
        - '&7Only visible to staff.'
      format: '{tag} &f{player}&8: {color}{message}'
    logging:
      enabled: true
      format: '&7[Staff] {player}: {message}'

  vip-local:
    permission: 'sir.channel.vip.use'
    access:
      prefixes: [ "@" ]
      commands: [ "/viplocal" ]
    audience:
      radius: 50
      permission: 'sir.channel.vip.see'
      include-sender: true
    style:
      tag: '&8[&bVIP Local&8]'
      prefix: '&6VIP'
      colors:
        normal: true
        default: '&f'
      format: '{tag} {prefix} &7{player}&8: {color}{message}'

  trade:
    inherits: 'global'
    access:
      prefixes: [ "$" ]
      commands: [ "/tradechat", "/tc" ]
    style:
      tag: '&8[&2Trade&8]'
      hover:
        - '&7Trade offers and market chatter.'
