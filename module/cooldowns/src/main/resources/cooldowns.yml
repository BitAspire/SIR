cooldowns:
  # Default Cooldown Settings
  default:
    # Permission and Priority
    # No special permission needed.
    permission: DEFAULT
    # Lowest priority level.
    priority: 0

    # Spam Check System
    spam:
      # Spam detection toggle.
      enabled: false
      # Maximum messages allowed.
      count: 5
      # Time window in seconds.
      time-limit: 10
      commands:
        - "kick {player}"

    time: 5
    messages:
      - '<P> &cYou cannot send another message in {time} seconds.'
