# Default Discord server ID used when a channel entry only provides CHANNEL_ID.
default-server: SERVER_ID

# Discord channel routes for each SIR event type.
channel-ids:
  # Sent when a player joins for the first time.
  first-join:
    # Primary Discord channel for this event.
    - CHANNEL_ID
    # Cross-server channel format: SERVER_ID:CHANNEL_ID.
    - OTHER_SERVER_ID:CHANNEL_ID

  # Sent when a returning player joins.
  join:
    - CHANNEL_ID
    - OTHER_SERVER_ID:CHANNEL_ID

  # Sent when a player leaves.
  quit:
    - CHANNEL_ID
    - OTHER_SERVER_ID:CHANNEL_ID

  # Sent when the channels module forwards global chat.
  global-chat:
    - CHANNEL_ID
    - OTHER_SERVER_ID:CHANNEL_ID

  # Sent when the advancements module forwards an advancement.
  advancements:
    - CHANNEL_ID
    - OTHER_SERVER_ID:CHANNEL_ID

# Discord message templates sent for each event type.
messages:
  first-join:
    # Plain Discord message content. Leave empty when the embed carries the message.
    text: ''
    # When true, Discord uses the player's name and skin for the webhook identity.
    player-webhook: false
    # Optional Discord embed payload.
    embed:
      # If false, only text is sent for this event.
      enabled: true
      # Discord embed side color. Named colors are resolved by the Discord module.
      color: YELLOW
      # Author block shown above the embed title.
      author:
        # Author display name.
        name: 'SIR Notifications'
        # Optional URL opened when the author name is clicked.
        url: 'https://wiki.bitaspire.com/en/docs/sir'
        # Optional author icon URL. {uuid} resolves to the player UUID.
        iconURL: 'https://crafatar.com/avatars/{uuid}'
      # Optional thumbnail image URL.
      thumbnail: 'https://crafatar.com/avatars/{uuid}'
      # Embed title. Use a string for title text only, or this object for text plus URL.
      title:
        text: 'SIR Chat Plugin'
        url: ''
      # Main embed body. Supports Discord markdown and SIR placeholders.
      description: ':bell: `{player} joined the server for the first time.`'
      # If true, Discord adds the current timestamp to the embed.
      timeStamp: true

  # Returning-player join template. Uses the same keys documented above.
  join:
    text: ''
    player-webhook: false
    embed:
      enabled: true
      color: GREEN
      author:
        name: 'SIR Notifications'
        url: 'https://wiki.bitaspire.com/en/docs/sir'
        iconURL: 'https://crafatar.com/avatars/{uuid}'
      thumbnail: 'https://crafatar.com/avatars/{uuid}'
      title: 'SIR Chat Plugin'
      description: ':white_check_mark: `{player} joined the server.`'
      timeStamp: true

  # Quit template. Embed is disabled by default because text is enough for this event.
  quit:
    text: ':x: `{player} left the server.`'
    player-webhook: false
    embed:
      enabled: false
      color: RED
      author:
        name: ''
        url: ''
        iconURL: ''
      thumbnail: ''
      title: ''
      description: ''
      timeStamp: true

  # Global chat relay template. {prefix}, {player}, {suffix}, and {message} come from chat.
  global-chat:
    # Webhook username when player-webhook is true. Leave empty to use the Minecraft username.
    name: ''
    text: '**{prefix}** {player} `{suffix}` :white_small_square: {message}'
    player-webhook: false

  # Advancement relay template. Placeholders are provided by the advancements' module.
  advancements:
    text: '**{player}** completed the {frame-lower-case}: **{advancement}**'
    player-webhook: false
