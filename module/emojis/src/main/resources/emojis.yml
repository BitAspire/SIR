# Emoji replacement rules. Replacement values support MiniMessage through
# Takion/PrismaticAPI, SIR tags, legacy color codes, hex colors, and placeholders.
emojis:
  1:
    # Text to replace in chat.
    key: ':admin:'
    # Matching options for this replacement.
    checks:
      # If true, key is treated as a regular expression.
      is-regex: false
      # If true, only full-word matches are replaced.
      is-word: false
      # If true, uppercase and lowercase must match exactly.
      case-sensitive: false
    # Replacement text inserted into chat using the supported SIR text formatting stack.
    value: '&dAdmin'

  2:
    # Minimal replacement example using default checks.
    key: ':heart:'
    # Replacement text inserted when :heart: is found.
    value: '&c<3'

  # Example that restricts a replacement to a permission and group.
  staff-badge:
    # Text or pattern to replace in chat.
    key: ':staff:'
    # Permission required to use this replacement.
    permission: emoji.staff
    # Higher priority entries run before lower priority entries.
    priority: 100
    # Optional permission group required for this replacement.
    group: STAFF
    # Matching options for this replacement.
    checks:
      # If true, key is treated as a regular expression.
      is-regex: false
      # If true, only full-word matches are replaced.
      is-word: true
      # If true, uppercase and lowercase must match exactly.
      case-sensitive: true
    # Replacement text inserted into chat.
    value: '&c[Staff]'

  # Example of a normal text replacement with word matching.
  custom-face:
    # Text or pattern to replace in chat.
    key: ':smile:'
    # Permission required to use this replacement.
    permission: emoji.member
    # Priority used when multiple replacements could match.
    priority: 50
    # Optional permission group required for this replacement.
    group: MEMBER
    # Matching options for this replacement.
    checks:
      is-regex: false
      is-word: true
      case-sensitive: false
    # Replacement text inserted into chat.
    value: '&e:)'

  # Example using SIR gradient/rainbow formatting tags.
  rainbow:
    # Text or pattern to replace in chat.
    key: ':rainbow:'
    # Permission required to use this replacement.
    permission: emoji.rainbow
    # Priority used when multiple replacements could match.
    priority: 75
    # DEFAULT allows normal players unless another permission provider restricts it.
    group: DEFAULT
    # Matching options for this replacement.
    checks:
      is-regex: false
      is-word: true
      case-sensitive: false
    # Replacement text using SIR rainbow formatting.
    value: '<R:1>Rainbow</R>'
