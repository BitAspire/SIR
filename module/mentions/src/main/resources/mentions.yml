# Mention text supports MiniMessage through Takion/PrismaticAPI, SIR tags,
# legacy color codes, hex colors, title/action-bar channels, and placeholders.
mentions:
  default:
    # Use DEFAULT to allow all players, or set a permission node for restricted mentions.
    permission: DEFAULT

    # Prefix typed before the receiver name. This value cannot be empty.
    prefix: '@'

    # Optional click action applied to the mention output.
    click: 'RUN:/msg {sender} Hello.'

    # Optional hover text applied to the mention output.
    hover:
      - '&7Sender: &e{sender}'
      - '<R:1>Click to send a message</R>'

    # Optional sounds played when this mention is triggered.
    sound:
      # Sound played to the player who sent the mention.
      sender:
        # If false, no sound is played to the sender.
        enabled: false
        # Bukkit sound name used for the sender notification.
        type: ENTITY_PLAYER_LEVELUP
        # Sender sound volume. 1.0 is normal volume.
        volume: 1.0
        # Sender sound pitch. 1.0 is normal pitch.
        pitch: 1.0

      # Sound played to the player who was mentioned.
      receiver:
        # If false, no sound is played to the receiver.
        enabled: true
        # Bukkit sound name used for the receiver notification.
        type: ENTITY_PLAYER_LEVELUP
        # Receiver sound volume. 1.0 is normal volume.
        volume: 1.0
        # Receiver sound pitch. 1.0 is normal pitch.
        pitch: 1.0

    # Optional private messages sent after a mention is detected.
    messages:
      # Messages sent to the sender. Use [] to disable sender messages.
      sender: []
      # Messages sent to the mentioned player. Supports SIR channels such as title and action-bar.
      receiver:
        - '[title:3] &bHi, {receiver}!<n>&7{sender} mentioned you.'
        - '[action-bar] &eReply when you are ready.'

    # Final text inserted into the chat message for the mention.
    # Available placeholders include {prefix}, {sender}, and {receiver}.
    value: '&b{prefix}{receiver}'
