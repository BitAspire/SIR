always-load-default-icon: true

max-players:
  # MAXIMUM shows online players plus one, CUSTOM uses count, DEFAULT uses server.properties.
  type: DEFAULT
  # Used only when type is CUSTOM.
  count: 100

server-icon:
  # DISABLED disables custom icons, SINGLE uses image, RANDOM or LIST read from the icons folder.
  usage: SINGLE
  # Used only when usage is SINGLE.
  image: server-icon.png

# Icon requirements:
# - 64x64 PNG file.
# - Stored in modules/motd/icons/.
# - Filename must match server-icon.image.
random-motd: false
