# MOTD entries. Each child key is a named style that can be selected or randomized.
# MOTD text supports MiniMessage through Takion/PrismaticAPI, SIR tags,
# legacy color codes, hex colors, and placeholders where available.
# Prefix a line with <C> to center it.
motd:
  first:
    # First line of the server list MOTD.
    1: '<R:1>Welcome to our server!</R>'
    # Second line of the server list MOTD.
    2: '&7IP:&e play.example.com'

  custom-name:
    1: '<C>&7A community Minecraft server'
    2: '<C>&aEnjoy your stay'
