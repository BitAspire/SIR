main: com.bitaspire.sir.module.scoreboard.ScoreboardModule
name: Scoreboard
title: "&bScoreboard Commands"
description:
  - "&7Administrative controls for the scoreboard module."

commands:
  scoreboard:
    aliases: [ scoreboards, sb ]
    override-existing: true
    permission: sir.scoreboard
    description: "Manage SIR scoreboards."
    usage: "/scoreboard <toggle|reload|refresh|debug>"
    permission-message: "&cYou do not have permission to use this command."
    sub-commands:
      help: sir.scoreboard.help
      toggle: sir.scoreboard.toggle
      reload: sir.scoreboard.reload
      refresh: sir.scoreboard.refresh
      debug: sir.scoreboard.debug
