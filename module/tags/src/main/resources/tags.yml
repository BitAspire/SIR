# Tags are evaluated by permission, group, and priority. Higher priority wins.
tags:
  custom-tag:
    # Text inserted into chat when this tag is selected.
    tag: "[Member]"
    # Permission required to use this tag.
    permission: "tag.member"
    # Priority used when multiple tags can apply.
    priority: 20
    # Optional player group requirement.
    group: member
    # Hover/description lines shown where tag descriptions are supported.
    description:
      - "This tag is available to players with the configured permission."
      - "Use this description to explain how the tag is obtained."
