bossbars:
  # Bossbar text supports MiniMessage through Takion/PrismaticAPI, SIR tags,
  # legacy color codes, hex colors, and placeholders where available.
  custom-bossbar:
    # If true, progress moves from 100% to 0% during the timer.
    progress-decrease: true

    # Display duration in seconds.
    time: 5

    messages:
      # Seconds between message rotations. Use 0 to keep the first line.
      interval: 0
      # Text values use the supported SIR text formatting stack.
      lines:
        - "&e&lWelcome to the server."

    # Supported formats are COLOR, STYLE, or COLOR:STYLE.
    formats:
      - "RED"
      - "SEGMENTED_12"
      - "GREEN:SOLID"

  bossbar-1:
    messages:
      # Multiple lines rotate while the bossbar is active.
      lines:
        - "&e&lWelcome to the server."
        - "&cEnjoy your stay."

    time: 7

    # A single value uses the provided color with the default SOLID style.
    formats: "BLACK"

# Available colors: BLUE, GREEN, PINK, PURPLE, RED, WHITE, YELLOW, BLACK.
# Available styles: SOLID, SEGMENTED_6, SEGMENTED_10, SEGMENTED_12, SEGMENTED_20.
