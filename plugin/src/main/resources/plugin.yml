# Main plugin class loaded by Bukkit or Paper.
main: com.bitaspire.sir.SIRPlugin

# Public plugin name shown in plugin lists.
name: SIR
# Version is injected by the Gradle build.
version: '${version}'
# Short prefix used by server logs.
prefix: SIR
# Plugin author metadata shown by Bukkit.
authors: [ CroaBeast ]
# Minimum Bukkit API version targeted by the plugin metadata.
api-version: 1.13

# Marks the plugin as compatible with Folia-style schedulers.
folia-supported: true

# Optional integrations. SIR loads without these plugins, but enables hooks when present.
softdepend:
  # Utility plugins
  - ViaVersion
  - Vault
  - PlaceholderAPI
  - InteractiveChat
  # Login plugins
  - AuthMe
  - nLogin
  - OpeNLogin
  # Vanish plugins
  - SuperVanish
  - PremiumVanish
  - CMI
  - Essentials
  # Misc
  - AdvancedBan
  - DiscordSRV
  - EssentialsDiscord

commands:
  # Main administration command.
  sir:
    # Permission required to use /sir.
    permission: sir.admin
    # Bukkit default permission holder.
    default: op

permissions:
  # Base administrator permission.
  sir.admin:
    default: op
    children:
      sir.admin.* : true

  # Wildcard administrator permission for all /sir subcommands.
  sir.admin.*:
    default: op
    children:
      sir.admin.modules: true
      sir.admin.about: true
      sir.admin.reload: true
      sir.admin.help: true
      sir.admin.commands: true
      sir.admin.support: true
      sir.admin.migrate: true
