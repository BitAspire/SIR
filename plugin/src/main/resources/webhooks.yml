###############################################################################

webhooks:
  webhook-1:
    # Keep disabled until a real Discord webhook URL is configured.
    enabled: false

    # Discord webhook URL. Replace both placeholder segments before enabling.
    url: 'https://discord.com/api/webhooks/WEBHOOK_ID/WEBHOOK_TOKEN'

    # Plain text sent outside embeds. Leave empty when the embed carries the message.
    content: ''
    # Display name used by Discord for this webhook message.
    username: 'SIR Notifications'
    # Optional avatar image URL for this webhook message. Leave empty to use Discord's default.
    avatar-url: ''
    # Enables Discord text-to-speech for the plain content message.
    tts: false

    # Embed payloads sent with this webhook. Each child entry defines one Discord embed.
    embeds:
      embed-1:
        # Main embed heading.
        title: 'SIR Notification'
        # Main embed body. {message} is replaced with the webhook message content.
        description: '{message}'
        # Optional URL opened when the embed title is clicked.
        url: ''

        # Footer shown at the bottom of the embed.
        footer:
          # Footer label text.
          text: 'BitAspire'
          # Optional footer icon URL.
          icon-url: ''

        # Optional image shown in the upper-right corner of the embed.
        thumbnail-url: ''
        # Optional large image shown below the embed description.
        image-url: ''

        # Author block shown above the embed title.
        author:
          # Author display name.
          name: 'SIR Webhook'
          # Optional URL opened when the author name is clicked.
          url: 'https://wiki.bitaspire.com/en/docs/sir'
          # Optional author icon URL.
          icon-url: ''

        # Add field entries when the embed needs structured data.
        # Expected field keys are name, value, and inline.
        fields: [ ]

  # Template slot for another webhook. Replace [] with the same structure as webhook-1.
  another-webhook: [ ]

# Required webhook components:
# - A valid Discord webhook URL.
# - At least one message source: content or embeds.
# - Complete embed sections when they are enabled.
# - HTTPS URLs for external images.
